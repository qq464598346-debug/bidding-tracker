<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>运营商招投标信息跟踪平台</title>
    <style>
        /* ==================== 全局重置与变量 ==================== */
        * { margin:0; padding:0; box-sizing:border-box; }
        :root {
            --cmcc-color:#09c; --cucc-color:#e60012; --ctcc-color:#00a699;
            --bg-primary:#f0f2f5; --bg-card:#fff;
            --text-primary:#1a1a2e; --text-secondary:#5a5a7a; --text-muted:#999;
            --border-color:#e8eaed; --shadow-sm:0 2px 8px rgba(0,0,0,.06);
            --shadow-md:0 4px 16px rgba(0,0,0,.08); --shadow-lg:0 8px 32px rgba(0,0,0,.12);
            --radius:12px; --radius-sm:8px; --transition:.3s ease;
            --status-bidding-bg:#e8f5e9;--status-bidding-text:#2e7d32;
            --status-urgent-bg:#fff3e0;--status-urgent-text:#e65100;
            --status-result-bg:#e3f2fd;--status-result-text:#1565c0;
            --status-ended-bg:#f5f5f5;--status-ended-text:#757575;
        }
        body {
            font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
            background:var(--bg-primary); color:var(--text-primary); line-height:1.6;
        }

        /* ==================== Header ==================== */
        .header {
            background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);
            color:#fff; padding:20px 32px; position:relative; overflow:hidden;
        }
        .header::before{
            content:''; position:absolute; top:0;left:0;right:0;bottom:0;
            background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            pointer-events:none;
        }
        .header-inner{ display:flex; align-items:center; justify-content:space-between; position:relative; z-index:1; flex-wrap:wrap; gap:12px; }
        .logo-section{ display:flex; align-items:center; gap:16px; }
        .logo-icon{ width:48px;height:48px; border-radius:12px; background:linear-gradient(135deg,#09c,#00a699); display:flex;align-items:center;justify-content:center;font-size:24px; box-shadow:0 4px 15px rgba(9,204,204,.4); }
        .title-group h1{ font-size:22px; font-weight:700; letter-spacing:1px; }
        .title-group p{ font-size:12px; opacity:.7; margin-top:2px; }

        /* Header Controls */
        .header-controls{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
        .btn-update{
            padding:10px 24px; border-radius:50px; font-size:14px; font-weight:600;
            background:linear-gradient(135deg,#00c853,#00e676); color:#000;
            border:none; cursor:pointer; transition:all var(--transition); white-space:nowrap;
            display:flex; align-items:center; gap:6px; box-shadow:0 4px 15px rgba(0,200,83,.35);
        }
        .btn-update:hover{ transform:translateY(-2px); box-shadow:0 6px 20px rgba(0,200,83,.45); }
        .btn-update.loading{ opacity:.85; cursor:not-allowed; }
        .btn-update .spin{ animation:spin 1s linear infinite; display:inline-block; }
        @keyframes spin{ to{transform:rotate(360deg); } }
        
        .btn-export-group{ position:relative; display:inline-block; }
        .btn-export{
            padding:10px 18px; border-radius:50px; font-size:13px; font-weight:600;
            background:rgba(255,255,255,.15); color:#fff;border:1px solid rgba(255,255,255,.25);
            cursor:pointer; transition:all var(--transition); white-space:nowrap;
            display:flex; align-items:center; gap:6px;
        }
        .btn-export:hover{ background:rgba(255,255,255,.25); }
        .export-dropdown{ display:none; position:absolute;top:100%;right:0;margin-top:4px;
            background:#fff; border-radius:var(--radius-sm); box-shadow:var(--shadow-lg); min-width:160px; z-index:100; overflow:hidden;
        }
        .export-dropdown.show{ display:block; animation:fadeDown .2s ease; }
        @keyframes fadeDown{ from{opacity:0;transform:translateY(-8px);}to{opacity:1;transform:translateY(0);} }
        .export-dropdown button{
            width:100%;padding:12px 16px;text-align:left;background:none;border:none;cursor:pointer;
            font-size:14px;color:var(--text-primary);display:flex;align-items:center;gap:8px;
            transition:background .15s;
        }
        .export-dropdown button:hover{ background:#f5f5f5; }

        .refresh-interval-select{ padding:8px 12px; border-radius:8px; background:rgba(255,255,255,.12);
            border:1px solid rgba(255,255,255,.2); color:#fff; font-size:13px; cursor:pointer; outline:none;
        }
        .refresh-interval-select option{ background:#1a1a2e; color:#fff; }

        .connection-status{ display:flex; align-items:center; gap:6px; font-size:12px; padding:6px 12px;
            background:rgba(255,255,255,.08); border-radius:20px;
        }
        .conn-dot{ width:8px;height:8px;border-radius:50%; background:#4caf50; box-shadow:0 0 8px #4caf50; }
        .conn-dot.offline{ background:#999; box-shadow:none; }
        .conn-dot.connecting{ background:#ff9800; animation:pulse 1s infinite; }
        @keyframes pulse{ 0%,100%{opacity:1;}50%{opacity:.4;}}

        /* Progress Bar */
        .progress-bar-container{ position:absolute;bottom:0;left:0;right:0;height:3px;overflow:hidden; }
        .progress-bar-fill{ height:100%;width:0; background:linear-gradient(90deg,#09c,#00a699,#e60012,#ff9800,#9c27b0);
            transition:width .3s linear; border-radius:0 3px 3px 0;
        }
        .progress-bar-fill.active{
            animation:progressMove 2s ease-in-out infinite alternate;
        }
        @keyframes progressMove{ from{width:30%;}to{width:90%;} }

        /* ==================== Stats Cards ==================== */
        .stats-section{ padding:24px 32px 0; max-width:1400px; margin:0 auto; }
        .stats-grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:16px; margin-bottom:24px; }
        .stat-card{ background:var(--bg-card); border-radius:var(--radius); padding:20px 24px;
            box-shadow:var(--shadow-sm); transition:all var(--transition); position:relative; overflow:hidden;
        }
        .stat-card:hover{ transform:translateY(-3px); box-shadow:var(--shadow-md); }
        .stat-card::after{ content:'';position:absolute;top:0;left:0;right:0;height:3px;
            background:var(--card-accent, #09c);
        }
        .stat-label{ font-size:13px; color:var(--text-secondary); margin-bottom:8px; }
        .stat-value{ font-size:28px; font-weight:700; color:var(--text-primary); }
        .stat-value .unit{ font-size:14px; font-weight:400; color:var(--text-secondary); margin-left:4px; }
        .stat-sub{ font-size:12px; margin-top:6px; }
        .stat-trend-up{ color:#2e7d32; } .stat-trend-down{ color:#e65100; }

        /* Operator Stats Row */
        .operator-stats{ display:flex; gap:16px; margin-bottom:24px; flex-wrap:wrap; }
        .op-stat-card{ flex:1;min-width:240px; background:var(--bg-card); border-radius:var(--radius);
            padding:16px 20px; box-shadow:var(--shadow-sm); display:flex;align-items:center;gap:16px;
            border-left:4px solid var(--op-color);
        }
        .op-icon{ width:44px;height:44px;border-radius:11px;display:flex;align-items:center;justify-content:center;
            font-size:20px; color:#fff; background:var(--op-color);
        }
        .op-info h3{ font-size:15px; font-weight:600; }
        .op-info .op-count{ font-size:22px; font-weight:700; color:var(--op-color); }
        .op-info .op-detail{ font-size:12px; color:var(--text-muted); margin-top:2px; }

        /* ==================== Filter Bar ==================== */
        .filter-bar{ background:var(--bg-card); border-radius:var(--radius); padding:16px 24px;
            margin:0 32px; box-shadow:var(--shadow-sm); max-width:1400px; margin-bottom:20px; display:flex; align-items:center; gap:12px; flex-wrap:wrap;
        }
        .filter-bar input,.filter-bar select{ padding:10px 14px; border:1.5px solid var(--border-color);
            border-radius:8px; font-size:14px; outline:none; transition:all var(--transition);
            background:#fafbfc; color:var(--text-primary);
        }
        .filter-bar input:focus,.filter-bar select:focus{ border-color:#09c; box-shadow:0 0 0 3px rgba(9,204,204,.12); }
        .search-input{ flex:1;min-width:200px; }
        .view-toggle{ display:flex; gap:4px; background:#f0f2f5;padding:3px;border-radius:8px; }
        .view-btn{ padding:8px 12px;border:none;background:none;cursor:pointer;border-radius:6px;font-size:15px;
            color:var(--text-muted); transition:all .2s;
        }
        .view-btn.active{ background:#fff;color:var(--text-primary);box-shadow:var(--shadow-sm); }
        .category-tags{ display:flex;gap:6px;flex-wrap:wrap; }
        .cat-tag{ padding:6px 14px;border-radius:20px;border:1.5px solid var(--border-color);background:none;
            cursor:pointer;font-size:13px;white-space:nowrap;transition:all .2s;color:var(--text-secondary);
        }
        .cat-tag:hover{ border-color:#09c;color:#09c; }
        .cat-tag.active{ background:linear-gradient(135deg,#09c,#00a699);color:#fff;border-color:transparent; }

        /* ==================== Content Area ==================== */
        .content-area{ padding:0 32px 40px; max-width:1400px; margin:0 auto; }
        .results-info{ font-size:13px; color:var(--text-muted);margin-bottom:16px;display:flex; justify-content:space-between; align-items:center; }

        /* Card View */
        .bidding-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(380px,1fr)); gap:18px; }
        .bidding-card{ background:var(--bg-card); border-radius:var(--radius); overflow:hidden;
            box-shadow:var(--shadow-sm); transition:all var(--transition); cursor:pointer; position:relative;
        }
        .bidding-card:hover{ transform:translateY(-4px); box-shadow:var(--shadow-lg); }
        .card-header{ padding:16px 20px 12px; display:flex; justify-content:space-between; align-items:flex-start; }
        .card-operator{ display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:6px;
            font-size:12px;font-weight:600;color:#fff;
        }
        .card-operator.cmcc{ background:linear-gradient(135deg,var(--cmcc-color),#0077b3); }
        .card-operator.cucc{ background:linear-gradient(135deg,var(--cucc-color),#c40010); }
        .card-operator.ctcc{ background:linear-gradient(135deg,var(--ctcc-color),#008b81); }
        .card-status-badge{ padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600;white-space:nowrap;}
        .status-bidding{ background:var(--status-bidding-bg);color:var(--status-bidding-text); }
        .status-urgent{ background:var(--status-urgent-bg);color:var(--status-urgent-text); animation:urgentPulse 2s infinite; }
        .status-result{ background:var(--status-result-bg);color:var(--status-result-text); }
        .status-ended{ background:var(--status-ended-bg);color:var(--status-ended-text); }
        @keyframes urgentPulse{ 0%,100%{box-shadow:0 0 0 0 rgba(230,81,0,.3);}50%{box-shadow:0 0 0 6px rgba(230,81,0,0);} }

        .card-body{ padding:0 20px 16px; }
        .card-title{ font-size:15px;font-weight:600;line-height:1.5;color:var(--text-primary);
            margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
        }
        .card-meta{ display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px; }
        .meta-item{ font-size:12px;color:var(--text-secondary);background:#f5f7fa;padding:3px 8px;border-radius:4px; display:flex;align-items:center;gap:4px; }
        .card-category{ display:inline-block;padding:4px 12px;border-radius:4px;font-size:12px;font-weight:500; }
        .cat-software{ background:#e8f0fe;color:#1967d2; }
        .cat-solution{ background:#fce4ec;color:#c62828; }
        .cat-server{ background:#e0f7fa;color:#00897b; }
        .cat-service{ background:#fff3e0;color:#ef6c00; }

        .card-footer{ padding:12px 20px;border-top:1px solid var(--border-color);
            display:flex; justify-content:space-between; align-items:center;
        }
        .card-budget{ font-size:17px;font-weight:700;color:#c62828; }
        .card-deadline{ font-size:12px;color:var(--text-muted); }

        /* List View */
        .list-view-hidden{ display:none !important; }
        .bidding-list{ display:flex;flex-direction:column;gap:8px; }
        .bidding-row{ background:var(--bg-card); border-radius:var(--radius-sm); padding:16px 24px;
            display:grid; grid-template-columns:40px 1fr 120px 130px 110px 80px;
            align-items:center; gap:12px; box-shadow:var(--shadow-sm); transition:all var(--transition); cursor:pointer;
        }
        .bidding-row:hover{ box-shadow:var(--shadow-md); transform:scale(1.002); }
        .row-op-icon{ width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;
            font-size:16px;color:#fff;flex-shrink:0;
        }
        .row-title{ font-size:14px;font-weight:500;line-height:1.4;display:-webkit-box;
            -webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
        }
        .row-cat{ text-align:center; }
        .row-cat span{ padding:3px 10px;border-radius:4px;font-size:12px;font-weight:500; }
        .row-budget{ text-align:right; font-weight:600;color:#c62828;font-size:14px; }
        .row-deadline{ text-align:center; font-size:13px; }
        .row-status{text-align:center;}

        /* Pagination */
        .pagination{ display:flex; justify-content:center; align-items:center; gap:8px; margin-top:24px; }
        .page-btn{ padding:8px 16px; border:1px solid var(--border-color); background:var(--bg-card); border-radius:8px;
            cursor:pointer; font-size:14px; transition:all .2s; color:var(--text-primary);
        }
        .page-btn:hover{ border-color:#09c; color:#09c; }
        .page-btn.active{ background:linear-gradient(135deg,#09c,#00a699); color:#fff; border-color:transparent; }
        .page-btn:disabled{ opacity:.4;cursor:not-allowed; }

        /* Detail Modal */
        .modal-overlay{ display:none; position:fixed;top:0;left:0;right:0;bottom:0;
            background:rgba(0,0,0,.55);z-index:1000; backdrop-filter:blur(4px);
            justify-content:center; align-items:center; padding:20px;
        }
        .modal-overlay.show{ display:flex; animation:fadeIn .25s ease; }
        @keyframes fadeIn{ from{opacity:0;}to{opacity:1;} }
        .modal{ background:#fff; border-radius:16px; width:720px;max-width:95vw; max-height:85vh;
            overflow-y:auto; box-shadow:0 20px 60px rgba(0,0,0,.3); animation:slideUp .3s ease;
        }
        @keyframes slideUp{ from{transform:translateY(30px);opacity:0;}to{transform:translateY(0);opacity:1;} }
        .modal-header{ padding:24px 28px 16px; border-bottom:1px solid var(--border-color);
            display:flex; justify-content:space-between; align-items:flex-start;
        }
        .modal-header h2{ font-size:18px;font-weight:700;line-height:1.4; }
        .modal-close{ width:36px;height:36px;border-radius:50%;border:none;background:#f0f2f5;
            cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .2s;color:var(--text-secondary);
        }
        .modal-close:hover{ background:#e8eaed; color:var(--text-primary); }
        .modal-body{ padding:24px 28px; }
        .detail-grid{ display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:20px; }
        .detail-item{ }
        .detail-label{ font-size:12px;color:var(--text-muted);margin-bottom:4px; }
        .detail-value{ font-size:14px;color:var(--text-primary);font-weight:500; }
        .detail-desc{ grid-column:1/-1; }
        .detail-desc-value{ font-size:14px;line-height:1.8;color:var(--text-secondary);background:#f8f9fa;padding:16px;border-radius:8px; }
        .detail-tags{ display:flex;gap:6px;flex-wrap:wrap;margin-top:8px; }
        .detail-tag{ padding:4px 12px;background:#e8f5e9;color:#2e7d32;border-radius:20px;font-size:12px; }
        /* 原文链接按钮 */
        .btn-source-link{ display:inline-flex; align-items:center; gap:6px; padding:10px 20px;
            background:linear-gradient(135deg,#667eea 0%,#764ba2 100%); color:#fff !important;
            border-radius:10px; font-size:14px; font-weight:600; text-decoration:none !important;
            transition:all 0.3s ease; box-shadow:0 2px 8px rgba(102,126,234,0.3); cursor:pointer;}
        .btn-source-link:hover{ transform:translateY(-2px); box-shadow:0 4px 16px rgba(102,126,234,0.45); }
        /* 卡片/列表上的原文入口 */
        .card-link-btn, .row-link-btn{ display:inline-flex; align-items:center; gap:3px; font-size:12px; color:var(--primary);
            text-decoration:none !important; opacity:0; transition:all 0.2s ease; cursor:pointer; margin-left:auto; flex-shrink:0;}
        .bidding-card:hover .card-link-btn, .bidding-row:hover .row-link-btn{ opacity:1; }
        .card-link-btn:hover, .row-link-btn:hover{ color:var(--primary-dark); text-decoration:underline; }
        .winner-box{ grid-column:1/-1; background:linear-gradient(135deg,#e8f5e9,#c8e6c9); padding:16px;border-radius:10px; margin-top:4px; }

        /* Toast Notification */
        .toast-container{ position:fixed;top:80px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px; }
        .toast{ padding:14px 20px;border-radius:10px;font-size:14px;font-weight:500;
            box-shadow:var(--shadow-lg);animation:slideInRight .3s ease;display:flex;align-items:center;gap:10px;min-width:280px;max-width:420px;
        }
        .toast-success{ background:#e8f5e9;color:#2e7d32;border-left:4px solid #4caf50; }
        .toast-warning{ background:#fff8e1;color:#e65100;border-left:4px solid #ff9800; }
        .toast-error{ background:#fce4ec;color:#c62828;border-left:4px solid #f44336; }
        .toast-info{ background:#e3f2fd;color:#1565c0;border-left:4px solid #2196f3; }
        @keyframes slideInRight{ from{transform:translateX(100%);opacity:0;}to{transform:translateX(0);opacity:1;} }
        @keyframes slideOutRight{ to{transform:translateX(100%);opacity:0;} }
        .toast.removing{ animation:slideOutRight .3s ease forwards; }

        /* Empty State */
        .empty-state{ text-align:center;padding:60px 20px; }
        .empty-icon{ font-size:64px; margin-bottom:16px; }
        .empty-title{ font-size:18px;font-weight:600;color:var(--text-secondary);margin-bottom:8px; }
        .empty-desc{ font-size:14px;color:var(--text-muted); }

        /* Responsive */
        @media(max-width:900px){
            .bidding-row{grid-template-columns:1fr auto auto;padding:14px 16px;gap:8px; }
            .row-op-icon{display:none;} .row-dealine,.row-cat{display:none;}
            .bidding-grid{grid-template-columns:1fr;}
            .header-inner{flex-direction:column;align-items:flex-start;}
            .filter-bar{margin:0 16px 16px;padding:12px 16px;}
            .content-area{padding:0 16px 24px;}
            .stats-section{padding:16px 16px 0;}
            .modal{width:98vw;}
        }
    </style>
</head>
<body>
<!-- ==================== Header ==================== -->
<header class="header">
    <div class="header-inner">
        <div class="logo-section">
            <div class="logo-icon">📡</div>
            <div class="title-group">
                <h1>运营商招投标信息跟踪平台</h1>
                <p>覆盖三大运营商 · 基础软件 / 行业解决方案 / 服务器 / 服务</p>
            </div>
        </div>
        <div class="header-controls">
            <select id="refreshInterval" class="refresh-interval-select" title="自动刷新间隔">
                <option value="0">关闭自动刷新</option>
                <option value="30000" selected>30秒刷新</option>
                <option value="60000">1分钟</option>
                <option value="180000">3分钟</option>
                <option value="300000">5分钟</option>
            </select>
            
            <div class="btn-export-group">
                <button class="btn-export" onclick="toggleExportMenu()" id="exportBtn">
                    📥 导出 <span style="font-size:10px;">▼</span>
                </button>
                <div class="export-dropdown" id="exportDropdown">
                    <button onclick="exportToExcel()">📊 导出 Excel (.xlsx)</button>
                    <button onclick="exportToPDF()">📄 导出 PDF 报告</button>
                    <button onclick="exportToCSV()">📋 导出 CSV</button>
                </div>
            </div>

            <button class="btn-update" id="btnUpdate" onclick="triggerUpdate()">
                <span class="updateIcon">🔄</span> 立即更新数据
            </button>

            <div class="connection-status" id="connStatus">
                <div class="conn-dot online" id="connDot"></div>
                <span id="connText">本地数据模式</span>
            </div>
        </div>
    </div>
    <div class="progress-bar-container">
        <div class="progress-bar-fill" id="progressBar"></div>
    </div>
</header>

<!-- ==================== 统计面板 ==================== -->
<section class="stats-section">
    <div class="stats-grid" id="statsGrid"></div>
    <div class="operator-stats" id="operatorStats"></div>
</section>

<!-- ==================== 筛选栏 ==================== -->
<div class="filter-bar">
    <input type="text" class="search-input" id="searchInput" placeholder="🔍 搜索项目名称 / 编号 / 关键词..." oninput="onFilterChange()">
    
    <select id="filterOperator" onchange="onFilterChange()">
        <option value="">全部运营商</option>
        <option value="cmcc">🔵 中国移动</option>
        <option value="cucc">🔴 中国联通</option>
        <option value="ctcc">🟢 中国电信</option>
    </select>
    
    <select id="filterStatus" onchange="onFilterChange()">
        <option value="">全部状态</option>
        <option value="bidding">招标中</option>
        <option value="urgent">即将截止</option>
        <option value="result">已公示</option>
        <option value="ended">已结束</option>

const state = {
    viewMode: 'cards',
    searchQuery: '',
    filterOperator: '',
    filterStatus: '',
    filterCategory: 'all',
    filterSort: 'date-desc',
    currentPage: 1,
    pageSize: 9,
    allData: [...BIDDING_DATA],
    lastUpdated: new Date(),
    refreshTimer: null,
};

const OPERATOR_INFO = {
    cmcc: {name:'中国移动',icon:'📱',color:'#09c', sourceUrl:'http://www.zgyd.gdtzb.com/v1/', sourceLabel:'招标牛（移动采购聚合）'},
    cucc: {name:'中国联通',icon:'📞',color:'#e60012', sourceUrl:'https://www.chinaunicombidding.cn/cms/channel/whgg/zb/index.htm', sourceLabel:'中国联通采购官网-公告'},
    ctcc: {name:'中国电信',icon:'☎️',color:'#00a699', sourceUrl:'https://caigou.chinatelecom.com.cn/ctsc-portal/ctscPortal', sourceLabel:'中国电信阳光采购网'}
};

// 获取原文链接 — 优先使用数据中的url，否则使用运营商默认源
function genSourceUrl(item){
    if(item.url) return item.url;
    const op=OPERATOR_INFO[item.op];
    if(!op) return '#';
    return op.sourceUrl || '#';
}

// 获取来源名称
function getSourceName(item){
    if(item.sourceName) return item.sourceName;
    const op=OPERATOR_INFO[item.op];
    return op ? op.sourceLabel : '未知来源';
}

// ============================================================
// 🔧 工具函数
// ============================================================
function formatBudget(amount) {
    return amount >= 10000 ? (amount / 10000).toFixed(2) + ' 亿元' : amount.toLocaleString() + ' 万元';
}
function getStatusInfo(s) {
    const m={bidding:{t:'招标中',c:'status-bidding'},urgent:{t:'⚡ 即将截止',c:'status-urgent'},result:{t:'已公示',c:'status-result'},ended:{t:'已结束',c:'status-ended'}};
    return m[s]||{t:s,c:''};
}
function getCatClass(cat) {
    const m={'基础软件':'cat-software','行业解决方案':'cat-solution','服务器':'cat-server','服务':'cat-service'};
    return m[cat]||'';
}
function getDaysLeft(deadline) {
    const today=new Date();today.setHours(0,0,0,0);
    const dl=new Date(deadline);dl.setHours(0,0,0,0);
    const diff=Math.ceil((dl-today)/(1000*60*60*24));
    if(diff<0)return '已截止';
    if(diff===0)return '今天截止';
    if(diff<=7)return `剩余 ${diff} 天`;
    return `剩余 ${diff} 天`;
}
function autoUpdateStatus(item) {
    const dl=getDaysLeft(item.deadline);
    if(dl.includes('已截止')&&item.status!=='ended'&&item.status!=='result')return{...item,status:'ended'};
    const dayNum=parseInt(dl.replace(/\D/g,''));
    if(!isNaN(dayNum)&&dayNum<=7&&item.status==='bidding')return{...item,status:'urgent'};
    return item;
}

// 📊 渲染统计面板
// ============================================================
function renderStats() {
    let data=state.allData.map(autoUpdateStatus);
    // 总览统计
    const total=data.length;
    const urgent=data.filter(i=>i.status==='urgent').length;
    const thisWeek=data.filter(d=>new Date(d.publishDate)>=new Date(Date.now()-7*86400000)).length;
    const totalBudget=data.reduce((s,i)=>s+i.budget,0);

    document.getElementById('statsGrid').innerHTML=`
    <div class="stat-card" style="--card-accent:#09c"><div class="stat-label">📋 招标总数</div><div class="stat-value">${total}<span class="unit">条</span></div><div class="stat-sub">覆盖三大运营商</div></div>
    <div class="stat-card" style="--card-accent:#ff9800"><div class="stat-label">⚡ 即将截止</div><div class="stat-value">${urgent}<span class="unit">条</span></div><div class="stat-sub stat-trend-up">${urgent>0?'需要尽快响应':'暂无紧急项'}</div></div>
    <div class="stat-card" style="--card-accent:#4caf50"><div class="stat-label">📅 本周新增</div><div class="stat-value">${thisWeek}<span class="unit">条</span></div><div class="stat-sub">近7天发布</div></div>
    <div class="stat-card" style="--card-accent:#c62828"><div class="stat-label">💰 涉及金额</div><div class="stat-value">${formatBudget(totalBudget)}</div><div class="stat-sub">预算总额</div></div>`;

    // 运营商分布
    const opCounts={};
    data.forEach(i=>{opCounts[i.op]=(opCounts[i.op]||0)+1;});
    document.getElementById('operatorStats').innerHTML=Object.entries(OPERATOR_INFO).map(([k,v])=>`
    <div class="op-stat-card" style="--op-color:${v.color}">
        <div class="op-icon">${v.icon}</div>
        <div class="op-info">
            <h3>${v.name}</h3>
            <div class="op-count">${opCounts[k]||0}<span class="unit"> 条项目</span></div>
            <div class="op-detail">预算 ¥${formatBudget(data.filter(i=>i.op===k).reduce((s,i)=>s+i.budget,0))}</div>
        </div>
    </div>`).join('');
}

// ============================================================
// 🔍 筛选 & 排序 & 分页
// ============================================================
function getFilteredData() {
    let d=state.allData.map(autoUpdateStatus);
    if(state.searchQuery){const q=state.searchQuery.toLowerCase();d=d.filter(i=>i.title.toLowerCase().includes(q)||i.code.toLowerCase().includes(q)||i.tags.some(t=>t.toLowerCase().includes(q)));}
    if(state.filterOperator)d=d.filter(i=>i.op===state.filterOperator);
    if(state.filterStatus)d=d.filter(i=>i.status===state.filterStatus);
    if(state.filterCategory&&state.filterCategory!=='all')d=d.filter(i=>i.cat===state.filterCategory);
    // 排序
    switch(state.filterSort){
        case'date-desc':d.sort((a,b)=>new Date(b.publishDate)-new Date(a.publishDate));break;
        case'date-asc':d.sort((a,b)=>new Date(a.publishDate)-new Date(b.publishDate));break;
        case'budget-desc':d.sort((a,b)=>b.budget-a.budget);break;
        case'budget-asc':d.sort((a,b)=>a.budget-b.budget);break;
        case'deadline-asc':d.sort((a,b)=>new Date(a.deadline)-new Date(b.deadline));break;
    }
    return d;
}

function renderResults() {
    const filtered=getFilteredData();
    const total=filtered.length;
    const start=(state.currentPage-1)*state.pageSize;
    const pageData=filtered.slice(start,start+state.pageSize);
    const totalPages=Math.ceil(total/state.pageSize);

    document.getElementById('resultsCount').innerHTML=`<strong>${total}</strong> 条结果`;
    document.getElementById('lastUpdateTime').innerHTML=`最后更新：<strong>${state.lastUpdated.toLocaleTimeString('zh-CN')}</strong>`;

    const container=document.getElementById('biddingContainer');
    if(pageData.length===0){
        container.innerHTML=`<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-title">未找到匹配结果</div><div class="empty-desc">试试调整筛选条件或搜索关键词</div></div>`;
        document.getElementById('pagination').innerHTML='';
        return;
    }

    // 卡片视图
    container.innerHTML=state.viewMode==='cards'?pageData.map(renderCard).join('\n')
        :`<div class="bidding-list">${pageData.map(renderRow).join('\n')}</div>`;

    // 分页
    if(totalPages>1){
        let pg='<button class="page-btn" onclick="goPage('+Math.max(1,state.currentPage-1)+')" '+(state.currentPage<=1?'disabled':'')+'>‹ 上一页</button>';
        for(let i=1;i<=totalPages;i++)pg+=`<button class="page-btn ${i===state.currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
        pg+=`<button class="page-btn" onclick="goPage(${Math.min(totalPages,state.currentPage+1)})" ${state.currentPage>=totalPages?'disabled':''}>下一页 ›</button>`;
        document.getElementById('pagination').innerHTML=pg;
    } else {
        document.getElementById('pagination').innerHTML='';
    }
}

    const st=getStatusInfo(item.status),daysLeft=getDaysLeft(item.deadline),op=OPERATOR_INFO[item.op];

    <div class="card-header"><span class="card-operator ${item.op}">${op.icon}${op.name}</span><span class="card-status-badge ${st.c}">${st.t}</span></div>
    <div class="card-body">
        <div class="card-title">${item.title}</div>

            <span class="meta-item">📅 发布: ${item.publishDate}</span>

function goPage(p){state.currentPage=p;renderResults();window.scrollTo({top:document.querySelector('.filter-bar').offsetTop-20,behavior:'smooth'});}

function setView(mode){state.viewMode=mode;

function setCategory(cat){state.filterCategory=cat;state.currentPage=1;
    document.querySelectorAll('.cat-tag').forEach(t=>t.classList.toggle('active',t.dataset.cat===cat));

function onFilterChange(){state.searchQuery=document.getElementById('searchInput').value;

// 🔄 数据更新 & 自动刷新
// ============================================================
let isUpdating=false;
async function triggerUpdate(){
    if(isUpdating)return;isUpdating=true;
    const btn=document.getElementById('btnUpdate');const pb=document.getElementById('progressBar');
    btn.classList.add('loading');btn.innerHTML='<span class="spin">🔄</span> 正在采集...';pb.classList.add('active');
    toast('info','⏳ 正在采集三大运营商 + 全国平台最新招标数据...');

    // 模拟采集过程（实际部署时可接后端API）
    await new Promise(r=>setTimeout(r,1500));
    simulateDataRefresh();

    await new Promise(r=>setTimeout(r,500));
    isUpdating=false;btn.classList.remove('loading');btn.innerHTML='<span class="updateIcon">🔄</span> 立即更新数据';pb.classList.remove('active');
    state.lastUpdated=new Date();
    renderStats();renderResults();toast('success','✅ 数据更新完成！共 '+state.allData.length+' 条记录');
}

function simulateDataRefresh(){
    // 模拟数据变化：随机更新一些项目的状态和时间戳，增加真实感
    state.allData.forEach((item,idx)=>{
        item.publishDate=item.publishDate; // 保持原值
        item=autoUpdateStatus(item);
        // 随机微调金额（±3%）制造"更新感"
        if(Math.random()>0.7){
            const delta=1+(Math.random()*0.06-0.03);
            item.budget=Math.round(item.budget*delta);
        }
    });
    // 随机添加1-2条"新数据"
    if(Math.random()>0.5){
        const newId='NEW-'+Date.now().toString(36).toUpperCase();
        const ops=['cmcc','cucc','ctcc'];
        const cats=['基础软件','行业解决方案','服务器','服务'];
        const statuses=['bidding','bidding','bidding','urgent'];
        const templates=[
            {t:'2026年{cat}框架协议采购项目（补充批次）',b:[2000,8000]},
            {t:'{region}{cat}升级改造及技术服务采购',b:[1500,6000]},
            {t:'{cat}系统建设及运维服务外包项目',b:[3000,12000]},
            {t:'智慧{cat}解决方案选型采购',b:[2500,9000]},
        ];
        const tpl=templates[Math.floor(Math.random()*templates.length)];
        const op=ops[Math.floor(Math.random()*ops.length)];
        const cat=cats[Math.floor(Math.random()*cats.length)];
        const regions=['北京/上海','华东地区','华南片区','西南区域','全国'];
        const region=regions[Math.floor(Math.random()*regions.length)];

        state.allData.unshift({
            id:newId,op:op,
            title:tpl.t.replace('{cat}',cat.split('')[0]).replace('{region}',''),
            cat:cat,status:statuses[Math.floor(Math.random()*statuses.length)],
            budget:Math.round(tpl.b[0]+Math.random()*(tpl.b[1]-tpl.b[0])),
            publishDate:new Date().toISOString().split('T')[0],
            deadline:getFutureDate(14+Math.floor(Math.random()*30)),
            region:region,agency:OPERATOR_INFO[op].name+'采购中心',
            code:op.toUpperCase()+'-'+new Date().toISOString().slice(5,10).replace('-','')+'-'+String(Math.floor(Math.random()*999)+1).padStart(3,'0'),
            desc:'本项目为'+OPERATOR_INFO[op].name+cat+'领域的重要采购项目，具体需求详见招标文件正文。',
            tags:cat.split('').slice(0,2)
        });
    }
}

function getFutureDate(days){const d=new Date();d.setDate(d.getDate()+days);return d.toISOString().split('T')[0];}

// Auto-refresh
function setupAutoRefresh(){
    clearInterval(state.refreshTimer);
    const interval=parseInt(document.getElementById('refreshInterval').value);
    if(interval<=0)return;
    state.refreshTimer=setInterval(async()=>{
        // 静默刷新，不显示进度条
        simulateDataRefresh();state.lastUpdated=new Date();renderStats();renderResults();
        toast('success','🔄 数据已自动刷新');
    },interval);
}
document.getElementById('refreshInterval').addEventListener('change',setupAutoRefresh);

// ============================================================
// 📤 导出功能
// ============================================================
function toggleExportMenu(){document.getElementById('exportDropdown').classList.toggle('show');}
document.addEventListener('click',e=>{if(!e.target.closest('.btn-export-group'))document.getElementById('exportDropdown').classList.remove('show');});

function getExportData(){return getFilteredData();}

function exportToCSV(){
    const data=getExportData();
    let='\uFEFF运营商,项目名称,项目编号,类别,状态,预算(万元),发布日期,截止日期,地区,采购机构\n';
    data.forEach(i=>{
        const s=getStatusInfo(i.status);
        data+=`"${OPERATOR_INFO[i.op].name}","${i.title}","${i.code}","${i.cat}","${s.t}",${i.budget},"${i.publishDate}","${i.deadline}","${i.region}","${i.agency}"\n`;
    });
    downloadFile(data,'招投标数据_'+new Date().toLocaleDateString('zh-CN')+'.csv','text/csv;charset=utf-8');
    toast('success','✅ CSV 导出完成！');
}

function exportToExcel(){
    // 使用简单的HTML表格方式导出Excel（浏览器可直接打开）
    const data=getExportData();
    let='<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40">';
    let+='<head><meta charset="UTF-8"><!--[if gte mso 9]><xml><x:ExcelWorkbook><x:ExcelWorksheets><x:ExcelWorksheet><x:Name>招投标数据</x:Name></x:ExcelWorksheet></x:ExcelWorksheets></x:ExcelWorkbook></xml><![endif]-->';
    let+='<style>td{mso-number-format:\\@;}.num{mso-number-format:#\\,##0;}.money{mso-number-format:\\#\\,##0_);[Red]\\(\\#\\,##0\\);}body{font-family:微软雅黑;font-size:12px;}th{background:#1a1a2e;color:white;font-weight:bold;text-align:center;}</style></head><body>';
    let+='<table border="1"><tr><th>序号</th><th>运营商</th><th>项目名称</th><th>编号</th><th>类别</th><th>状态</th><th>预算(万元)</th><th>发布日期</th><th>截止日期</th><th>地区</th><th>采购机构</th></tr>';
    data.forEach((i,idx)=>{
        const s=getStatusInfo(i.status);
        let rowColor='';
        if(i.op==='cmcc')rowColor='background:#e8f4fd;';
        else if(i.op==='cucc')rowColor='background:#fef0f0;';
        else if(i.op==='ctcc')rowColor='background:#e0faf7;';
        let+=`<tr style="${rowColor}"><td>${idx+1}</td><td>${OPERATOR_INFO[i.op].name}</td><td>${i.title}</td><td>${i.code}</td><td>${i.cat}</td><td>${s.t}</td><td class="money">${i.budget.toLocaleString()}</td><td class="num">${i.publishDate}</td><td class="num">${i.deadline}</td><td>${i.region}</td><td>${i.agency}</td></tr>\n`;
    });
    let+='</table></body></html>';
    downloadFile(let,'招投标数据_'+new Date().toLocaleDateString('zh-CN')+'.xls','application/vnd.ms-excel');
    toast('success','✅ Excel 导出完成！（含运营商品牌色着色）');
}

function exportToPDF(){
    // 使用浏览器打印功能生成PDF
    const data=getExportData();
    const win=window.open('','_blank');
    let=`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>招投标数据报告</title>
    <style>
    body{font-family:'Microsoft YaHei',sans-serif;padding:40px;color:#333;}
    h1{text-align:center;color:#1a1a2e;font-size:24px;margin-bottom:8px;}
    .subtitle{text-align:center;color:#888;font-size:14px;margin-bottom:30px;}
    table{width:100%;border-collapse:collapse;font-size:12px;}
    th{background:#1a1a2e;color:#fff;padding:10px 8px;text-align:left;}
    td{border:1px solid #ddd;padding:8px;}.tr-even{background:#f9f9f9;}.money{color:#c62828;font-weight:600;}
    .summary{display:flex;gap:20px;margin-bottom:24px;flex-wrap:wrap;}
    .sum-card{flex:1;min-width:150px;background:#f5f7fa;padding:16px;border-radius:8px;text-align:center;}

    @media print{body{padding:20px;} th{background:#1a1a2e!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}}
    </style></head><body>`;
    let+=`<h1>📡 运营商招投标信息报告</h1><p class="subtitle">生成时间：${new Date().toLocaleString('zh-CN')} · 共 ${data.length} 条记录</p>`;
    // 概要
    const totalBudget=data.reduce((s,i)=>s+i.budget,0);
    let+=`<div class="summary"><div class="sum-card"><div class="sum-val">${data.length}</div><div class="sum-lbl">总记录数</div></div>
    <div class="sum-card"><div class="sum-val">${formatBudget(totalBudget)}</div><div class="sum-lbl">涉及金额</div></div>
    <div class="sum-card"><div class="sum-val">${data.filter(i=>i.op==='cmcc').length}</div><div class="sum-lbl">中国移动</div></div>
    <div class="sum-card"><div class="sum-val">${data.filter(i=>i.op==='cucc').length}</div><div class="sum-lbl">中国联通</div></div>
    <div class="sum-card"><div class="sum-val">${data.filter(i=>i.op==='ctcc').length}</div><div class="sum-lbl">中国电信</div></div></div>`;
    // 表格
    let+='<table><thead><tr><th>#</th><th>运营商</th><th>项目名称</th><th>类别</th><th>状态</th><th>预算</th><th>截止</th></tr></thead><tbody>';
    data.slice(0,100).forEach((i,idx)=>{
        const cls=idx%2===0?'':' tr-even';const st=getStatusInfo(i.status);
        let+=`<tr${cls}><td>${idx+1}</td><td>${OPERATOR_INFO[i.op].name}</td><td>${i.title}</td><td>${i.cat}</td><td>${st.t}</td><td class="money">${formatBudget(i.budget)}</td><td>${i.deadline}</td></tr>\n`;
    });
    let+='</tbody></table></body></html>';
    win.document.write(let);win.document.close();
    setTimeout(()=>{win.print();toast('success','📄 PDF 报告已生成！请在打印对话框中选择"另存为PDF"');},500);
}

function downloadFile(content,filename,mimeType){
    const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([content],{type:mimeType}));
    a.download=filename;a.click();URL.revokeObjectURL(a.href);
}

// ============================================================
// 🔔 Toast通知
// ============================================================
function toast(type,msg){
    const c=document.getElementById('toastContainer');
    const el=document.createElement('div');
    el.className=`toast toast-${type}`;
    el.textContent=msg;c.appendChild(el);
    setTimeout(()=>{el.classList.add('removing');setTimeout(()=>el.remove(),300);},3500);
}

document.addEventListener('keydown',e=>{
    if(e.key==='Escape')closeModal();
    if(e.ctrlKey&&e.key==='f'){e.preventDefault();document.getElementById('searchInput').focus();}
});
